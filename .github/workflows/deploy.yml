name: Deploy frontend

# Auto-deploy on every push to main. You can also trigger it manually
# from the Actions tab (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /root/kanban/frontend
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            mkdir -p /var/www/kanban
            rm -rf /var/www/kanban/*
            cp -r dist/* /var/www/kanban/
            echo "Frontend deployed: $(git rev-parse --short HEAD)"
